<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RYFT Esports</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
<video autoplay muted loop playsinline class="bg-video">
    <source src="/bg.mp4" type="video/mp4">
</video>
<nav>
    <div class="logo">
        <img src="/favicon.png" alt="RYFT Logo">
    </div>
    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/tournaments">Tournaments</a></li>
        <li><a href="#">Leaderboard</a></li>
        <li><a href="/login">Login</a></li>
    </ul>
</nav>

<section class="hero">
    <h1>RYFT <span>ESPORTS</span></h1>
    <p>Play fearless. Rise stronger. Dominate every battlefield.</p>

    <div class="buttons">
        <a href="/signup" class="btn primary">JOIN THE WAR</a>
        <a href="/tournaments" class="btn secondary">ENTER TOURNAMENTS</a>
    </div>
</section>

<section class="stats">
    <div class="card">
        <h2>5,000+</h2>
        <p>Players</p>
    </div>
    <div class="card">
        <h2>₹50,000+</h2>
        <p>Prize Pool</p>
    </div>
    <div class="card">
        <h2>120+</h2>
        <p>Matches Hosted</p>
    </div>
</section>

</body>
</html>
